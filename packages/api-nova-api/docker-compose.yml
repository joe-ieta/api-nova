version: '3.8'

services:
  api-nova-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
      - "9022:9022"
    environment:
      - NODE_ENV=development
      - PORT=9001
      - MCP_PORT=9022
      - API_KEY=dev-api-key-change-in-production
      - CORS_ORIGINS=http://localhost:9000,http://localhost:5173
      - LOG_LEVEL=debug
      - METRICS_ENABLED=true
      - HEALTH_CHECK_ENABLED=true
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npm", "run", "start:dev"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a simple web UI for testing
  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    environment:
      - SWAGGER_JSON_URL=http://localhost:9001/api-json
    depends_on:
      - api-nova-api

networks:
  default:
    name: mcp-swagger-network
